<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fridge to Feast — Turn your ingredients into a meal</title>
  <meta name="description" content="Add what you have in your fridge, pick a cuisine, and get a full recipe with nutrition facts instantly." />

  <!-- Google AdSense — replace ca-pub-XXXXXXXXXXXXXXXX with your publisher ID -->
  <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script> -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #fff0f0;
      --bg-tertiary: #ffe5e5;
      --text-primary: #1a0202;
      --text-secondary: #8b2020;
      --text-tertiary: #c05050;
      --border-light: rgba(192,0,0,0.12);
      --border-medium: rgba(192,0,0,0.25);
      --accent: #c0392b;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 1.5rem 1rem 4rem;
    }

    .app {
      max-width: 680px;
      margin: 0 auto;
    }

    /* Header */
    .app-header {
      margin-bottom: 1rem;
    }

    .app-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--accent);
    }

    .app-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 5px;
      line-height: 1.5;
    }

    /* Ad banner */
    .ad-slot {
      width: 100%;
      min-height: 90px;
      background: var(--bg-primary);
      border: 0.5px dashed var(--border-medium);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      overflow: hidden;
    }

    /* Hides placeholder text once a real ad fills in */
    .ad-slot ins { display: block; width: 100%; }

    /* Card wrapper */
    .card {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    /* Step label */
    .step-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.09em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* Ingredient input row */
    .input-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: stretch;
    }

    input[type="text"],
    input[type="number"],
    select {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-medium);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 14px;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      border-color: var(--text-primary);
    }

    input[type="text"] { flex: 1; min-width: 140px; }
    input[type="number"] { width: 80px; flex: 0 0 80px; }
    select.unit-select { width: 100px; flex: 0 0 100px; }
    select.region-select { width: 100%; }

    .add-btn {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-medium);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      padding: 8px 16px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .add-btn:hover { background: var(--bg-tertiary); }

    /* Chips */
    .chips-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      min-height: 20px;
    }

    .chips-count {
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .clear-btn {
      background: none;
      border: none;
      font-size: 12px;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      transition: color 0.15s;
    }

    .clear-btn:hover { color: var(--accent); }

    .chips-container {
      margin-top: 8px;
      min-height: 32px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-light);
      border-radius: 20px;
      padding: 4px 10px 4px 12px;
      font-size: 13px;
      color: var(--text-primary);
    }

    .chip-qty {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .chip-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      font-size: 16px;
      line-height: 1;
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }

    .chip-remove:hover { color: #c0392b; }

    .empty-hint {
      font-size: 13px;
      color: var(--text-tertiary);
      font-style: italic;
      padding: 4px 0;
    }

    /* Generate button */
    .generate-btn {
      width: 100%;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: var(--bg-primary);
      border: none;
      border-radius: var(--radius-lg);
      margin-top: 0.5rem;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    .generate-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .generate-btn:not(:disabled):hover { opacity: 0.88; }
    .generate-btn:not(:disabled):active { transform: scale(0.99); }

    /* Loading */
    .loading-wrap {
      text-align: center;
      padding: 2rem 0;
    }

    .loading-dots {
      display: inline-flex;
      gap: 5px;
      align-items: center;
      margin-bottom: 8px;
    }

    .loading-dots span {
      width: 7px;
      height: 7px;
      background: var(--text-tertiary);
      border-radius: 50%;
      animation: dot-bounce 1.2s ease-in-out infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    .loading-text {
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* Result card */
    .result-card {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-top: 1rem;
      animation: fade-in 0.3s ease;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .recipe-name {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .recipe-meta {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 1.25rem;
      display: flex;
      flex-wrap: wrap;
      gap: 4px 12px;
    }

    .result-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--accent);
      margin: 1.25rem 0 8px;
    }

    /* Ingredients table */
    .ingr-table {
      width: 100%;
      font-size: 14px;
      border-collapse: collapse;
    }

    .ingr-table tr { border-bottom: 0.5px solid var(--border-light); }
    .ingr-table tr:last-child { border-bottom: none; }

    .ingr-table td {
      padding: 6px 0;
      color: var(--text-primary);
    }

    .ingr-table td:first-child { color: var(--text-secondary); }
    .ingr-table td:last-child { text-align: right; font-weight: 500; }

    /* Steps */
    .steps-list {
      list-style: none;
      counter-reset: steps;
    }

    .steps-list li {
      counter-increment: steps;
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 14px;
      line-height: 1.65;
      color: var(--text-primary);
    }

    .steps-list li::before {
      content: counter(steps);
      min-width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
      margin-top: 3px;
      color: #ffffff;
    }

    /* Chef tip */
    .tip-box {
      background: var(--bg-secondary);
      border-left: 3px solid var(--accent);
      padding: 10px 14px;
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    /* Nutrition grid */
    .nutrition-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 8px;
    }

    .nutrition-item {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 10px 12px;
    }

    .nutrition-label {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 3px;
    }

    .nutrition-value {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .nutrition-unit {
      font-size: 11px;
      color: var(--text-tertiary);
      font-weight: 400;
    }

    /* Try again button */
    .try-again-btn {
      display: block;
      width: 100%;
      margin-top: 1.25rem;
      padding: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      border: 0.5px solid var(--border-medium);
      border-radius: var(--radius-md);
      transition: background 0.15s;
      text-align: center;
    }

    .try-again-btn:hover { background: var(--bg-tertiary); }

    /* Error */
    .error-msg {
      background: #fff5f5;
      border: 0.5px solid #f5c6cb;
      border-radius: var(--radius-md);
      padding: 12px 16px;
      font-size: 13px;
      color: #a02020;
      margin-top: 1rem;
    }

    @media (max-width: 480px) {
      .input-row { flex-direction: column; }
      input[type="number"] { width: 100%; flex: auto; }
      select.unit-select { width: 100%; flex: auto; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="app-header">
    <div class="app-title">Fridge to Feast</div>
    <div class="app-subtitle">Add whatever you have — even just 2 ingredients — and get a real recipe in seconds.</div>
  </div>

  <!-- Ad Slot: Top Banner -->
  <!-- Replace the comment below with your actual AdSense ins tag when ready -->
  <!--
  <div class="ad-slot">
    <ins class="adsbygoogle"
         style="display:block"

         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

  <!-- Step 1: Add Ingredients -->
  <div class="card">
    <div class="step-label">Step 1 — What's in your fridge?</div>
    <div class="input-row">
      <input type="text" id="ingr-name" placeholder="e.g. Tomato, Eggs, Paneer, Chicken…" />
      <input type="number" id="ingr-qty" placeholder="Qty" min="1" />
      <select class="unit-select" id="ingr-unit">
        <option value="g">grams</option>
        <option value="kg">kg</option>
        <option value="ml">ml</option>
        <option value="L">liters</option>
        <option value="pcs">pieces</option>
        <option value="cups">cups</option>
        <option value="tbsp">tbsp</option>
        <option value="tsp">tsp</option>
      </select>
      <button class="add-btn" onclick="addIngredient()">+ Add</button>
    </div>
    <div class="chips-header" id="chips-header" style="display:none;">
      <span class="chips-count" id="chips-count"></span>
      <button class="clear-btn" onclick="clearAll()">Clear all</button>
    </div>
    <div class="chips-container" id="chips-container">
      <span class="empty-hint">No ingredients added yet. Qty is optional.</span>
    </div>
  </div>

  <!-- Step 2: Choose Region -->
  <div class="card">
    <div class="step-label">Step 2 — Pick a cuisine (optional)</div>
    <select class="region-select" id="region-select">
      <option value="Surprise Me">Surprise Me — Any cuisine</option>
      <optgroup label="Indian States">
        <option value="Andhra Pradesh / Telugu">Andhra Pradesh (Telugu)</option>
        <option value="Assam / Assamese">Assam (Assamese)</option>
        <option value="Bengal / Bengali">Bengal (Bengali)</option>
        <option value="Bihar / Bihari">Bihar (Bihari)</option>
        <option value="Goa / Goan">Goa (Goan)</option>
        <option value="Gujarat / Gujarati">Gujarat (Gujarati)</option>
        <option value="Hyderabad / Hyderabadi">Hyderabad (Hyderabadi)</option>
        <option value="Karnataka / Kannadiga">Karnataka (Kannadiga)</option>
        <option value="Kashmir / Kashmiri">Kashmir (Kashmiri)</option>
        <option value="Kerala / Keralite">Kerala (Keralite)</option>
        <option value="Madhya Pradesh / Malwi">Madhya Pradesh (Malwi)</option>
        <option value="Maharashtra / Maharashtrian">Maharashtra (Maharashtrian)</option>
        <option value="Odisha / Odia">Odisha (Odia)</option>
        <option value="Punjab / Punjabi">Punjab (Punjabi)</option>
        <option value="Rajasthan / Rajasthani">Rajasthan (Rajasthani)</option>
        <option value="Tamil Nadu / Tamil">Tamil Nadu (Tamil)</option>
        <option value="Telangana">Telangana</option>
        <option value="Uttar Pradesh / Awadhi">Uttar Pradesh (Awadhi)</option>
        <option value="Uttarakhand / Pahari">Uttarakhand (Pahari)</option>
      </optgroup>
      <optgroup label="International Cuisines">
        <option value="Chinese">Chinese</option>
        <option value="French">French</option>
        <option value="Greek">Greek</option>
        <option value="Italian">Italian</option>
        <option value="Japanese">Japanese</option>
        <option value="Lebanese / Middle Eastern">Lebanese / Middle Eastern</option>
        <option value="Mexican">Mexican</option>
        <option value="Thai">Thai</option>
        <option value="Turkish">Turkish</option>
        <option value="American">American</option>
      </optgroup>
    </select>
  </div>

  <!-- Generate Button -->
  <button class="generate-btn" id="gen-btn" onclick="generateRecipe()">
    Find My Recipe
  </button>

  <!-- Ad Slot: Mid-page (shown after user clicks generate) -->
  <!-- Replace the comment below with your actual AdSense ins tag when ready -->

  <div class="ad-slot" id="ad-mid" style="margin-top: 1rem;">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
         data-ad-slot="XXXXXXXXXX"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>
  -->

  <!-- Result Area -->
  <div id="result-area"></div>

</div>

<script>
  /* ── State ── */
  const ingredients = [];

  /* ── Add Ingredient ── */
  function addIngredient() {
    const nameEl = document.getElementById('ingr-name');
    const qtyEl  = document.getElementById('ingr-qty');
    const unitEl = document.getElementById('ingr-unit');

    const name = nameEl.value.trim();
    const qty  = qtyEl.value.trim();
    const unit = unitEl.value;

    if (!name) { nameEl.focus(); return; }

    ingredients.push({ name, qty, unit });
    renderChips();

    nameEl.value = '';
    qtyEl.value  = '';
    nameEl.focus();
  }

  /* Enter key on ingredient name field */
  document.getElementById('ingr-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') addIngredient();
  });

  /* ── Remove Ingredient ── */
  function removeIngredient(i) {
    ingredients.splice(i, 1);
    renderChips();
  }

  /* ── Clear All ── */
  function clearAll() {
    ingredients.length = 0;
    renderChips();
  }

  /* ── Render Chips ── */
  function renderChips() {
    const container  = document.getElementById('chips-container');
    const header     = document.getElementById('chips-header');
    const countLabel = document.getElementById('chips-count');

    if (!ingredients.length) {
      header.style.display = 'none';
      container.innerHTML  = '<span class="empty-hint">No ingredients added yet. Qty is optional.</span>';
      return;
    }

    header.style.display = 'flex';
    countLabel.textContent = `${ingredients.length} ingredient${ingredients.length > 1 ? 's' : ''} added`;

    container.innerHTML = ingredients.map((ing, i) => {
      const qtyLabel = ing.qty ? ` · ${ing.qty} ${ing.unit}` : '';
      return `
        <span class="chip">
          ${ing.name}
          ${ing.qty ? `<span class="chip-qty">${qtyLabel}</span>` : ''}
          <button class="chip-remove" onclick="removeIngredient(${i})" title="Remove">×</button>
        </span>`;
    }).join('');
  }

  /* ── Generate Recipe ── */
  async function generateRecipe() {
    if (!ingredients.length) {
      alert('Add at least one ingredient first!');
      return;
    }

    const region     = document.getElementById('region-select').value;
    const btn        = document.getElementById('gen-btn');
    const resultArea = document.getElementById('result-area');

    btn.disabled    = true;
    btn.textContent = 'Finding your recipe…';

    const loadingMsg = region === 'Surprise Me'
      ? 'Picking the best recipe for your ingredients…'
      : `Finding a perfect ${region} recipe for your ingredients…`;

    resultArea.innerHTML = `
      <div class="loading-wrap">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <div class="loading-text">${loadingMsg}</div>
      </div>`;

    const ingredientList = ingredients
      .map(i => `${i.name}${i.qty ? ` (${i.qty} ${i.unit})` : ''}`)
      .join(', ');

    const regionGuide = {
      "Andhra Pradesh / Telugu": "Andhra food is known for being very spicy and hot. Common dishes are pesarattu (green moong crepe), gongura pachadi (sorrel chutney), pulihora (tamarind rice), gutti vankaya (stuffed brinjal curry), and pappu (dal). Andhra cooking uses a lot of red chili, tamarind, and mustard seeds. The taste is bold, tangy, and fiery.",
      "Assam / Assamese": "Assamese food is light, simple, and mildly spiced. Common dishes are masor tenga (sour fish curry), khar (alkaline curry), aloo pitika (mashed potato with mustard oil), and panta bhat (fermented rice). Mustard oil, fermented ingredients, and light spices are key. The taste is mild, earthy, and sour.",
      "Bengal / Bengali": "Bengali food loves mustard oil, mustard paste, and fish. Common dishes are macher jhol (light fish curry), aloo posto (potato with poppy seeds), shorshe ilish (hilsa in mustard gravy), cholar dal (chana dal), and mishti doi (sweet curd). The taste is delicate, slightly sweet, and uses panch phoron (5-spice mix).",
      "Bihar / Bihari": "Bihari food is simple and wholesome. Common dishes are litti chokha (baked wheat balls with roasted brinjal mash), sattu paratha, dal puri, chana ghugni, and kadhi. Bihari cooking uses mustard oil, sattu (roasted gram flour), and simple spices. The taste is earthy and filling.",
      "Goa / Goan": "Goan food is coastal and uses coconut, tamarind, and vinegar. Common dishes are fish curry rice, prawn balchao, chicken cafreal, pork vindaloo, and xacuti. Kokum, coconut milk, and red chilies are key. The taste is tangy, coconut-rich, and mildly spicy.",
      "Gujarat / Gujarati": "Gujarati food is mostly vegetarian, mildly sweet, and balances sweet-salty-sour in every dish. Common dishes are dhokla, thepla, undhiyu, dal dhokli, and kadhi. Jaggery and lemon are added to many dishes. The taste is light, slightly sweet, and comforting.",
      "Hyderabad / Hyderabadi": "Hyderabadi food is rich, aromatic, and Mughal-influenced. Famous dishes are Hyderabadi biryani, haleem, mirchi ka salan, bagara baingan, and double ka meetha. Fried onions, whole spices, and slow dum cooking are key. The taste is rich, meaty, and deeply spiced.",
      "Karnataka / Kannadiga": "Karnataka food uses rice, ragi, and coconut heavily. Common dishes are bisi bele bath (rice-lentil-vegetable dish), jolada rotti (jowar flatbread), vangi bath, akki rotti, and saaru (rasam). The taste is mild to medium spicy with coconut and tamarind flavors.",
      "Kashmir / Kashmiri": "Kashmiri food is rich and warming, using Kashmiri red chili (gives color but not too much heat), fennel, and dry ginger. Common dishes are rogan josh, yakhni (curd-based lamb), dum aloo, methi chaman, and kahwa. No onion or garlic in many Kashmiri Pandit dishes. The taste is aromatic and warming.",
      "Kerala / Keralite": "Kerala food is coconut-heavy and uses coconut oil, coconut milk, and curry leaves. Common dishes are fish molee, appam with stew, puttu with kadala curry, avial (mixed vegetable coconut dish), and sambar. The taste is mildly spiced, coconut-forward, and fresh.",
      "Madhya Pradesh / Malwi": "MP food is rustic and wheat-based. Common dishes are dal baati churma, bhutte ki kees (spiced corn), poha, chakki ki shak, and bhopali gosht korma. Ghee is used generously. The taste is hearty, wholesome, and mildly spiced.",
      "Maharashtra / Maharashtrian": "Maharashtrian food uses peanuts, sesame, and kokum. Common dishes are varan bhaat (simple dal rice), misal pav, thalipeeth (multigrain flatbread), puran poli, and bharli vangi (stuffed brinjal). The taste ranges from mild coastal to spicy Kolhapuri.",
      "Odisha / Odia": "Odia food is simple, lightly spiced, and temple-style. Common dishes are dalma (dal with vegetables), pakhala bhata (fermented rice), santula (boiled vegetables), machha jhola (fish curry), and rasabali (sweet). Minimal oil and spices are used. The taste is clean, simple, and wholesome.",
      "Punjab / Punjabi": "Punjabi food is rich, hearty, and uses lots of ghee, butter, and cream. Famous dishes are dal makhani, butter chicken, sarson da saag with makki di roti, rajma chawal, and chole bhature. The taste is bold, rich, and deeply satisfying.",
      "Rajasthan / Rajasthani": "Rajasthani food is very spicy, dried, and long-lasting (desert cooking). Common dishes are dal baati churma, gatte ki sabzi (gram flour dumplings in curd gravy), ker sangri, laal maas (red spicy mutton), and bajre ki roti with lasun chutney. The taste is very spicy, tangy, and bold.",
      "Tamil Nadu / Tamil": "Tamil food uses rice, tamarind, and a lot of curry leaves and mustard seeds. Common dishes are sambar, rasam, curd rice, pongal (rice-lentil porridge), kootu (vegetable-lentil dish), and idli-dosa. Sesame oil and tamarind are key. The taste is tangy, mildly spicy, and aromatic.",
      "Telangana": "Telangana food is earthier than Andhra. Common dishes are sajja roti (pearl millet bread), sarva pindi (rice flour pancake), gongura chicken, pesarattu, and jonna roti. Red chili and tamarind are used heavily. The taste is bold, spicy, and rustic.",
      "Uttar Pradesh / Awadhi": "Awadhi food from UP is refined and aromatic, developed in royal kitchens. Famous dishes are biryani (dum-style), nihari, kebabs (galouti, seekh), korma, and dal tadka. Slow cooking and whole spices are key. The taste is rich, mildly spiced, and fragrant.",
      "Uttarakhand / Pahari": "Pahari food is simple and nourishing. Common dishes are aloo ke gutke (spiced potatoes), kafuli (spinach-fenugreek curry), chainsoo (black dal), bhang ki chutney, and bal mithai. Minimal oil is used. The taste is simple, earthy, and wholesome.",
      "Chinese": "Authentic Chinese home cooking uses soy sauce, sesame oil, ginger, garlic, and rice wine. Common dishes are egg fried rice, mapo tofu, kung pao chicken, stir-fried vegetables, and congee. The taste is umami-rich, savory, and balanced.",
      "French": "French home cooking uses butter, cream, and fresh herbs like thyme and bay leaf. Common dishes are ratatouille, French omelette, soupe a l oignon, quiche, and poulet roti. The taste is buttery, rich, and herb-forward.",
      "Greek": "Greek food uses olive oil, lemon, garlic, and oregano heavily. Common dishes are moussaka, spanakopita, Greek salad, fasolada (bean soup), and souvlaki. The taste is fresh, lemony, and Mediterranean.",
      "Italian": "Italian home cooking is simple and lets ingredients shine. Common dishes are pasta aglio e olio, risotto, pizza margherita, minestrone soup, and bruschetta. Good olive oil, garlic, and tomatoes are the base. The taste is fresh, clean, and comforting.",
      "Japanese": "Japanese home cooking is simple, clean, and umami-rich. Common dishes are miso soup, tamago gohan (egg rice), oyakodon (chicken-egg rice bowl), nikujaga (meat-potato stew), and yakimeshi (fried rice). Soy sauce, mirin, and dashi are key. The taste is delicate, savory, and balanced.",
      "Lebanese / Middle Eastern": "Lebanese food uses olive oil, lemon, garlic, cumin, and fresh herbs. Common dishes are hummus, tabbouleh, fattoush, lentil soup, and shawarma. The taste is fresh, tangy, and herb-forward.",
      "Mexican": "Mexican home cooking uses cumin, chili, lime, garlic, and tomatoes. Common dishes are tacos, frijoles (beans), arroz rojo (red rice), quesadillas, and guacamole. The taste is bold, smoky, and tangy.",
      "Thai": "Thai food balances sweet, sour, salty, and spicy in every dish. Common dishes are pad Thai, khao pad (fried rice), tom kha (coconut soup), som tam (green papaya salad), and green curry. Fish sauce, lime, and chili are key. The taste is vibrant and balanced.",
      "Turkish": "Turkish home cooking uses yogurt, tomatoes, eggplant, and olive oil. Common dishes are menemen (scrambled eggs with tomatoes), mercimek corbasi (lentil soup), imam bayildi (stuffed eggplant), pilaf, and kofte. The taste is savory, mild, and comforting.",
      "American": "American home cooking is hearty and comforting. Common dishes are mac and cheese, grilled cheese sandwich, chicken soup, meatloaf, mashed potatoes, and pancakes. Butter, cheese, and simple seasonings are key. The taste is rich, filling, and comforting."
    };

    let authGuide, cuisineInstruction;
    if (region === 'Surprise Me') {
      authGuide = '';
      cuisineInstruction = `Pick the BEST cuisine and dish that works perfectly with the user's ingredients. Choose any cuisine from the world — Indian, Chinese, Italian, Mexican, Thai, Middle Eastern, American, etc. Pick whatever dish would taste best and be simplest to make with these exact ingredients.`;
    } else {
      authGuide = regionGuide[region] || '';
      cuisineInstruction = `Make a dish from ${region} cuisine. ${authGuide ? `\n\nABOUT THIS CUISINE:\n${authGuide}` : ''}`;
    }

    const prompt = `You are a home cooking expert who knows recipes from every part of the world.

The user has these ingredients: ${ingredientList}.
${cuisineInstruction}

STRICT RULES — follow every single one:

RULE 1 — REALISTIC DISH: Only suggest a dish that people actually cook and eat at home. The dish must be genuinely cookable with the listed ingredients plus basic pantry staples.

RULE 2 — SIMPLE COMMON INGREDIENTS ONLY: Only use ingredients found in a normal home kitchen — salt, oil, onion, garlic, ginger, tomato, green chili, red chili powder, turmeric, cumin, coriander powder, mustard seeds, curry leaves, ghee, butter, milk, rice, flour, sugar, jaggery, tamarind, lemon, yogurt, water. Do NOT add rare or hard-to-find items.

RULE 3 — SIMPLE ENGLISH ONLY: Write every step in short, easy sentences. Use the simplest words possible.
BAD: "Saute the aromatics until translucent and deglaze with stock."
GOOD: "Cook the onion in oil for 3 minutes until soft and light brown."
Anyone with basic English must be able to follow each step.

RULE 4 — SHORT STEPS: Each step = 1 to 2 sentences only. No long paragraphs.

RULE 5 — USE THE USER'S INGREDIENTS: Build the recipe around what the user already has. Only add very basic pantry items if truly needed.

Respond ONLY with a valid JSON object — no markdown, no extra text:
{
  "recipe_name": "Actual name of the dish",
  "cuisine": "Name of the cuisine / region",
  "servings": 2,
  "prep_time": "10 mins",
  "cook_time": "20 mins",
  "ingredients_used": [
    {"name": "ingredient name", "amount": "quantity with unit"}
  ],
  "steps": [
    "Step written in simple English",
    "Next step in simple English"
  ],
  "chef_tip": "One short practical tip",
  "nutrition_per_serving": {
    "calories": 350,
    "protein_g": 18,
    "carbs_g": 42,
    "fat_g": 12,
    "fiber_g": 5,
    "sodium_mg": 480
  }
}

Nutrition values must be realistic.`;

    try {
      const response = await fetch("/api/recipe", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt })
      });

      const data = await response.json();
      if (!response.ok) throw new Error(data.error || 'Server error');
      const cleanText = (data.text || '').replace(/```json|```/g, '').trim();

      let recipe;
      try {
        recipe = JSON.parse(cleanText);
      } catch (_) {
        throw new Error('The recipe response was incomplete. Please try again.');
      }

      renderResult(recipe);
    } catch (err) {
      resultArea.innerHTML = `
        <div class="error-msg">
          Something went wrong. Please try again.<br>
          <small style="opacity:0.55; margin-top:4px; display:block;">${err.message}</small>
        </div>`;
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Find My Recipe';
    }
  }

  /* ── Render Result ── */
  function renderResult(r) {
    const n = r.nutrition_per_serving || {};

    const metaParts = [r.cuisine, `${r.servings} servings`, `Prep: ${r.prep_time}`, `Cook: ${r.cook_time}`];

    const stepsHTML = (r.steps || [])
      .map(s => `<li><span>${s}</span></li>`)
      .join('');

    const ingrHTML = (r.ingredients_used || [])
      .map(i => `<tr><td>${i.name}</td><td>${i.amount}</td></tr>`)
      .join('');

    const nutritionItems = [
      { label: 'Calories',  value: n.calories,    unit: 'kcal' },
      { label: 'Protein',   value: n.protein_g,   unit: 'g' },
      { label: 'Carbs',     value: n.carbs_g,     unit: 'g' },
      { label: 'Fat',       value: n.fat_g,        unit: 'g' },
      { label: 'Fiber',     value: n.fiber_g,      unit: 'g' },
      { label: 'Sodium',    value: n.sodium_mg,    unit: 'mg' },
    ].map(item => `
      <div class="nutrition-item">
        <div class="nutrition-label">${item.label}</div>
        <div class="nutrition-value">${item.value ?? '—'}<span class="nutrition-unit"> ${item.unit}</span></div>
      </div>`).join('');

    document.getElementById('result-area').innerHTML = `
      <div class="result-card">

        <div class="recipe-name">${r.recipe_name}</div>
        <div class="recipe-meta">${metaParts.join(' &nbsp;·&nbsp; ')}</div>

        <div class="result-section-title">Ingredients</div>
        <table class="ingr-table">${ingrHTML}</table>

        <div class="result-section-title">How to make it</div>
        <ol class="steps-list">${stepsHTML}</ol>

        ${r.chef_tip ? `
          <div class="result-section-title">Chef's tip</div>
          <div class="tip-box">${r.chef_tip}</div>` : ''}

        <div class="result-section-title">Nutrition &mdash; per serving</div>
        <div class="nutrition-grid">${nutritionItems}</div>

        <button class="try-again-btn" onclick="generateRecipe()">Generate another recipe with the same ingredients</button>

      </div>`;

    /* Scroll result into view on mobile */
    document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
</script>

</body>
</html>

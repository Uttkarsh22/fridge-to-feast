<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fridge to Feast — Turn your ingredients into a meal</title>
  <meta name="description" content="Add what you have in your fridge, pick a cuisine, and get a full recipe with nutrition facts instantly." />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#c0392b" />

  <!-- Google AdSense — replace ca-pub-XXXXXXXXXXXXXXXX with your publisher ID -->
  <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script> -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #fff0f0;
      --bg-tertiary: #ffe5e5;
      --text-primary: #1a0202;
      --text-secondary: #8b2020;
      --text-tertiary: #c05050;
      --border-light: rgba(192,0,0,0.12);
      --border-medium: rgba(192,0,0,0.25);
      --accent: #c0392b;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 1.5rem 1rem 4rem;
    }

    .app {
      max-width: 680px;
      margin: 0 auto;
    }

    /* Header */
    .app-header {
      margin-bottom: 1rem;
    }

    .app-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .app-logo {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      border-radius: 8px;
    }

    .app-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--accent);
    }

    .app-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 5px;
      line-height: 1.5;
    }

    /* Ad banner */
    .ad-slot {
      width: 100%;
      min-height: 90px;
      background: var(--bg-primary);
      border: 0.5px dashed var(--border-medium);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      overflow: hidden;
    }

    /* Hides placeholder text once a real ad fills in */
    .ad-slot ins { display: block; width: 100%; }

    /* Card wrapper */
    .card {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    /* Step label */
    .step-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.09em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* Ingredient input row */
    .input-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: stretch;
    }

    input[type="text"],
    input[type="number"],
    select {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-medium);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 14px;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      border-color: var(--text-primary);
    }

    input[type="text"] { flex: 1; min-width: 140px; }
    input[type="number"] { width: 80px; flex: 0 0 80px; }
    select.unit-select { width: 100px; flex: 0 0 100px; }
    .qty-unit-group { display: flex; gap: 8px; align-items: stretch; }

    /* Custom Autocomplete */
    .autocomplete-wrap { position: relative; flex: 1; min-width: 140px; }
    .autocomplete-wrap input[type="text"] { width: 100%; flex: none; }
    .autocomplete-list {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--bg-primary);
      border: 0.5px solid var(--border-medium);
      border-radius: var(--radius-md);
      box-shadow: 0 6px 24px rgba(192, 0, 0, 0.14);
      z-index: 200;
      max-height: 220px;
      overflow-y: auto;
    }
    .autocomplete-item {
      padding: 9px 14px;
      font-size: 14px;
      color: var(--text-primary);
      cursor: pointer;
      border-bottom: 0.5px solid var(--border-light);
      transition: background 0.1s;
    }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover,
    .autocomplete-item.ac-active { background: var(--bg-secondary); }
    .autocomplete-item mark { background: none; color: var(--accent); font-weight: 600; }
    select.region-select { width: 100%; }

    .add-btn {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-medium);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      padding: 8px 16px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .add-btn:hover { background: var(--bg-tertiary); }

    /* Chips */
    .chips-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      min-height: 20px;
    }

    .chips-count {
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .clear-btn {
      background: none;
      border: none;
      font-size: 12px;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      transition: color 0.15s;
    }

    .clear-btn:hover { color: var(--accent); }

    .chips-container {
      margin-top: 8px;
      min-height: 32px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-light);
      border-radius: 20px;
      padding: 4px 10px 4px 12px;
      font-size: 13px;
      color: var(--text-primary);
    }

    .chip-qty {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .chip-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      font-size: 16px;
      line-height: 1;
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }

    .chip-remove:hover { color: #c0392b; }

    .empty-hint {
      font-size: 13px;
      color: var(--text-tertiary);
      font-style: italic;
      padding: 4px 0;
    }

    /* Generate button */
    .generate-btn {
      width: 100%;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: var(--bg-primary);
      border: none;
      border-radius: var(--radius-lg);
      margin-top: 0.5rem;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    .generate-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .generate-btn:not(:disabled):hover { opacity: 0.88; }
    .generate-btn:not(:disabled):active { transform: scale(0.99); }

    /* Loading */
    .loading-wrap {
      text-align: center;
      padding: 2rem 0;
    }

    .loading-dots {
      display: inline-flex;
      gap: 5px;
      align-items: center;
      margin-bottom: 8px;
    }

    .loading-dots span {
      width: 7px;
      height: 7px;
      background: var(--text-tertiary);
      border-radius: 50%;
      animation: dot-bounce 1.2s ease-in-out infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    .loading-text {
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* Result card */
    .result-card {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-top: 1rem;
      animation: fade-in 0.3s ease;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .recipe-name {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .recipe-meta {
      margin-bottom: 1.25rem;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .recipe-meta-badge {
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-medium);
      border-radius: 20px;
      padding: 3px 10px;
    }

    .result-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--accent);
      margin: 1.25rem 0 8px;
    }

    /* Ingredients table */
    .ingr-table {
      width: 100%;
      font-size: 14px;
      border-collapse: collapse;
    }

    .ingr-table tr { border-bottom: 0.5px solid var(--border-light); }
    .ingr-table tr:last-child { border-bottom: none; }

    .ingr-table td {
      padding: 6px 0;
      color: var(--text-primary);
    }

    .ingr-table td:first-child { color: var(--text-secondary); }
    .ingr-table td:last-child { text-align: right; font-weight: 500; }

    /* Steps */
    .steps-list {
      list-style: none;
      counter-reset: steps;
    }

    .steps-list li {
      counter-increment: steps;
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 14px;
      line-height: 1.65;
      color: var(--text-primary);
    }

    .steps-list li::before {
      content: counter(steps);
      min-width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
      margin-top: 3px;
      color: #ffffff;
    }

    /* Chef tip */
    .tip-box {
      background: var(--bg-secondary);
      border-left: 3px solid var(--accent);
      padding: 10px 14px;
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    /* Nutrition grid */
    .nutrition-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .nutrition-item {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 10px 12px;
    }

    .nutrition-label {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 3px;
    }

    .nutrition-value {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .nutrition-unit {
      font-size: 11px;
      color: var(--text-tertiary);
      font-weight: 400;
    }

    /* Try again button — ghost/tertiary */
    .try-again-btn {
      display: block;
      width: 100%;
      margin-top: 1rem;
      padding: 8px;
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      background: none;
      color: var(--text-tertiary);
      border: none;
      border-radius: var(--radius-md);
      transition: color 0.15s;
      text-align: center;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .try-again-btn:hover { color: var(--text-secondary); }

    /* Error */
    .error-msg {
      background: #fff5f5;
      border: 0.5px solid #f5c6cb;
      border-radius: var(--radius-md);
      padding: 12px 16px;
      font-size: 13px;
      color: #a02020;
      margin-top: 1rem;
    }

    /* Dietary checkboxes */
    .dietary-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .dietary-option { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 14px; color: var(--text-primary); }
    .dietary-option input[type="checkbox"] { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }

    /* History section */
    .history-section { margin-top: 1.5rem; }
    .history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .history-title { font-size: 11px; font-weight: 600; color: var(--accent); letter-spacing: 0.09em; text-transform: uppercase; }
    .history-list { display: flex; flex-direction: column; gap: 6px; }
    .history-item { background: var(--bg-primary); border: 0.5px solid var(--border-light); border-radius: var(--radius-md); padding: 10px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; transition: background 0.15s; }
    .history-item:hover { background: var(--bg-secondary); }
    .history-item-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .history-item-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .history-item-time { font-size: 11px; color: var(--text-tertiary); white-space: nowrap; flex-shrink: 0; margin-top: 2px; }

    /* Speak / TTS */
    .speak-bar { display: flex; gap: 6px; margin-top: 1.25rem; }
    .speak-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px; padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-md); transition: opacity 0.15s; }
    .speak-btn:hover { opacity: 0.88; }
    .speak-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .speak-ctrl { padding: 11px 14px; font-size: 16px; cursor: pointer; background: var(--bg-secondary); border: 0.5px solid var(--border-medium); border-radius: var(--radius-md); transition: background 0.15s; }
    .speak-ctrl:hover { background: var(--bg-tertiary); }

    /* Share button — secondary outlined */
    .share-btn { display: block; width: 100%; margin-top: 0.75rem; padding: 10px; font-size: 14px; font-weight: 500; cursor: pointer; background: transparent; color: var(--text-secondary); border: 1px solid var(--border-medium); border-radius: var(--radius-md); transition: background 0.15s; text-align: center; }
    .share-btn:hover { background: var(--bg-secondary); }

    /* YouTube link — secondary outlined */
    .yt-link { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 0.75rem; padding: 10px 14px; background: transparent; border: 1px solid var(--accent); border-radius: var(--radius-md); font-size: 14px; font-weight: 500; color: var(--accent); text-decoration: none; transition: background 0.15s; }
    .yt-link:hover { background: #fff0f0; }
    .yt-link svg { flex-shrink: 0; }

    /* Save to collection — secondary outlined */
    .save-btn { display: block; width: 100%; margin-top: 0.75rem; padding: 10px; font-size: 14px; font-weight: 500; cursor: pointer; background: transparent; color: var(--text-secondary); border: 1px solid var(--border-medium); border-radius: var(--radius-md); transition: background 0.15s; text-align: center; }
    .save-btn:hover { background: var(--bg-secondary); }
    .save-panel { margin-top: 8px; background: var(--bg-secondary); border: 0.5px solid var(--border-medium); border-radius: var(--radius-md); overflow: hidden; }
    .save-panel-item { display: flex; justify-content: space-between; align-items: center; padding: 9px 14px; cursor: pointer; font-size: 14px; color: var(--text-primary); border-bottom: 0.5px solid var(--border-light); transition: background 0.15s; }
    .save-panel-item:hover { background: var(--bg-tertiary); }
    .save-panel-count { font-size: 12px; color: var(--text-tertiary); }
    .save-panel-empty { padding: 10px 14px; font-size: 13px; color: var(--text-tertiary); font-style: italic; }
    .save-panel-new { display: flex; gap: 6px; padding: 10px; border-top: 0.5px solid var(--border-light); }
    .save-panel-new input { flex: 1; font-size: 13px; padding: 7px 10px; background: var(--bg-primary); border: 0.5px solid var(--border-medium); border-radius: var(--radius-md); color: var(--text-primary); outline: none; }
    .save-panel-new input:focus { border-color: var(--accent); }
    .save-panel-new button { padding: 7px 12px; font-size: 13px; font-weight: 500; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-md); cursor: pointer; white-space: nowrap; }

    /* Collections section */
    .collections-section { margin-top: 1.5rem; }
    .collections-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .collections-title { font-size: 11px; font-weight: 600; color: var(--accent); letter-spacing: 0.09em; text-transform: uppercase; }
    .collection-card { background: var(--bg-primary); border: 0.5px solid var(--border-light); border-radius: var(--radius-md); margin-bottom: 6px; overflow: hidden; }
    .collection-card-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; transition: background 0.15s; }
    .collection-card-header:hover { background: var(--bg-secondary); }
    .collection-chevron { font-size: 10px; color: var(--text-tertiary); transition: transform 0.15s; flex-shrink: 0; }
    .collection-chevron.open { transform: rotate(90deg); }
    .collection-name { font-size: 14px; font-weight: 500; color: var(--text-primary); flex: 1; }
    .collection-count { font-size: 12px; color: var(--text-tertiary); }
    .collection-del-btn { background: none; border: none; cursor: pointer; font-size: 16px; color: var(--text-tertiary); padding: 0; line-height: 1; transition: color 0.15s; }
    .collection-del-btn:hover { color: var(--accent); }
    .collection-recipes { border-top: 0.5px solid var(--border-light); }
    .collection-recipe-item { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-bottom: 0.5px solid var(--border-light); }
    .collection-recipe-item:last-child { border-bottom: none; }
    .collection-recipe-info { flex: 1; cursor: pointer; }
    .collection-recipe-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
    .collection-recipe-meta { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
    .collection-recipe-remove { background: none; border: none; cursor: pointer; font-size: 15px; color: var(--text-tertiary); padding: 0; line-height: 1; transition: color 0.15s; flex-shrink: 0; }
    .collection-recipe-remove:hover { color: var(--accent); }

    /* Form accordion */
    .form-section { transition: none; }
    .form-section.collapsed { display: none; }

    .form-accordion {
      display: none;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-primary);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 12px 16px;
      margin-bottom: 1rem;
      cursor: pointer;
      transition: background 0.15s;
      gap: 10px;
    }
    .form-accordion:hover { background: var(--bg-secondary); }
    .form-accordion.visible { display: flex; }
    .form-accordion-summary { flex: 1; min-width: 0; }
    .form-accordion-label { font-size: 11px; font-weight: 600; color: var(--accent); letter-spacing: 0.09em; text-transform: uppercase; margin-bottom: 3px; }
    .form-accordion-detail { font-size: 13px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .form-accordion-edit { font-size: 12px; font-weight: 500; color: var(--accent); white-space: nowrap; flex-shrink: 0; }

    @media (max-width: 480px) {
      .input-row { flex-wrap: wrap; }
      input[type="text"] { flex: 1 1 100%; }
      .autocomplete-wrap { flex: 1 1 100%; }
      .qty-unit-group { display: flex; gap: 8px; flex: 1 1 auto; }
      .qty-unit-group input[type="number"] { width: 80px; flex: 0 0 80px; }
      .qty-unit-group select.unit-select { flex: 1; width: auto; }
      .add-btn { flex: 1 1 100%; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="app-header">
    <div class="app-title-row">
      <img src="/icon.svg" alt="" class="app-logo" />
      <div class="app-title">Fridge to Feast</div>
    </div>
    <div class="app-subtitle">Add whatever you have — even just 2 ingredients — and get a real recipe in seconds.</div>
  </div>

  <!-- Ad Slot: Top Banner -->
  <!-- Replace the comment below with your actual AdSense ins tag when ready -->
  <!--
  <div class="ad-slot">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
         data-ad-slot="XXXXXXXXXX"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>
  -->

  <!-- Accordion summary bar (shown when form is collapsed) -->
  <div id="form-accordion" class="form-accordion" onclick="toggleFormSection()">
    <div class="form-accordion-summary">
      <div class="form-accordion-label">Your selection</div>
      <div class="form-accordion-detail" id="form-accordion-detail"></div>
    </div>
    <span class="form-accordion-edit">✎ Edit</span>
  </div>

  <!-- Steps + generate button -->
  <div id="form-section">

  <!-- Step 1: Add Ingredients -->
  <div class="card">
    <div class="step-label">Step 1 — What's in your fridge?</div>
    <div class="input-row">
      <div class="autocomplete-wrap">
        <input type="text" id="ingr-name" placeholder="e.g. Tomato, Eggs, Paneer, Chicken…" autocomplete="off" />
        <div id="autocomplete-list" class="autocomplete-list"></div>
      </div>
      <div class="qty-unit-group">
        <input type="number" id="ingr-qty" placeholder="Qty" min="1" />
        <select class="unit-select" id="ingr-unit">
          <option value="g">grams</option>
          <option value="kg">kg</option>
          <option value="ml">ml</option>
          <option value="L">liters</option>
          <option value="pcs">pieces</option>
          <option value="cups">cups</option>
          <option value="tbsp">tbsp</option>
          <option value="tsp">tsp</option>
        </select>
      </div>
      <button class="add-btn" onclick="addIngredient()">+ Add</button>
    </div>
    <div class="chips-header" id="chips-header" style="display:none;">
      <span class="chips-count" id="chips-count"></span>
      <button class="clear-btn" onclick="clearAll()">Clear all</button>
    </div>
    <div class="chips-container" id="chips-container">
      <span class="empty-hint">No ingredients added yet. Qty is optional.</span>
    </div>
  </div>

  <!-- Step 2: Choose Region -->
  <div class="card">
    <div class="step-label">Step 2 — Pick a cuisine (optional)</div>
    <select class="region-select" id="region-select">
      <option value="Surprise Me">Surprise Me — Any cuisine</option>
      <optgroup label="Indian States">
        <option value="Andhra Pradesh / Telugu">Andhra Pradesh (Telugu)</option>
        <option value="Assam / Assamese">Assam (Assamese)</option>
        <option value="Bengal / Bengali">Bengal (Bengali)</option>
        <option value="Bihar / Bihari">Bihar (Bihari)</option>
        <option value="Goa / Goan">Goa (Goan)</option>
        <option value="Gujarat / Gujarati">Gujarat (Gujarati)</option>
        <option value="Hyderabad / Hyderabadi">Hyderabad (Hyderabadi)</option>
        <option value="Karnataka / Kannadiga">Karnataka (Kannadiga)</option>
        <option value="Kashmir / Kashmiri">Kashmir (Kashmiri)</option>
        <option value="Kerala / Keralite">Kerala (Keralite)</option>
        <option value="Madhya Pradesh / Malwi">Madhya Pradesh (Malwi)</option>
        <option value="Maharashtra / Maharashtrian">Maharashtra (Maharashtrian)</option>
        <option value="Odisha / Odia">Odisha (Odia)</option>
        <option value="Punjab / Punjabi">Punjab (Punjabi)</option>
        <option value="Rajasthan / Rajasthani">Rajasthan (Rajasthani)</option>
        <option value="Tamil Nadu / Tamil">Tamil Nadu (Tamil)</option>
        <option value="Telangana">Telangana</option>
        <option value="Uttar Pradesh / Awadhi">Uttar Pradesh (Awadhi)</option>
        <option value="Uttarakhand / Pahari">Uttarakhand (Pahari)</option>
      </optgroup>
      <optgroup label="International Cuisines">
        <option value="Chinese">Chinese</option>
        <option value="French">French</option>
        <option value="Greek">Greek</option>
        <option value="Italian">Italian</option>
        <option value="Japanese">Japanese</option>
        <option value="Lebanese / Middle Eastern">Lebanese / Middle Eastern</option>
        <option value="Mexican">Mexican</option>
        <option value="Thai">Thai</option>
        <option value="Turkish">Turkish</option>
        <option value="American">American</option>
      </optgroup>
    </select>
  </div>

  <!-- Step 3: Dietary Restrictions -->
  <div class="card">
    <div class="step-label">Step 3 — Dietary restrictions (optional)</div>
    <div class="dietary-grid">
      <label class="dietary-option"><input type="checkbox" id="diet-vegetarian" value="vegetarian" onchange="handleDietaryChange()" /> Vegetarian</label>
      <label class="dietary-option"><input type="checkbox" id="diet-vegan" value="vegan" onchange="handleDietaryChange()" /> Vegan</label>
      <label class="dietary-option"><input type="checkbox" id="diet-gluten-free" value="gluten-free" onchange="handleDietaryChange()" /> No Gluten</label>
      <label class="dietary-option"><input type="checkbox" id="diet-dairy-free" value="dairy-free" onchange="handleDietaryChange()" /> No Dairy</label>
      <label class="dietary-option"><input type="checkbox" id="diet-nut-free" value="nut-free" onchange="handleDietaryChange()" /> No Nuts</label>
    </div>
  </div>

  <!-- Generate Button -->
  <button class="generate-btn" id="gen-btn" onclick="generateRecipe()">
    Find My Recipe
  </button>

  </div><!-- /form-section -->

  <!-- Ad Slot: Mid-page (shown after user clicks generate) -->
  <!-- Replace the comment below with your actual AdSense ins tag when ready -->

  <div class="ad-slot" id="ad-mid" style="margin-top: 1rem;">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
         data-ad-slot="XXXXXXXXXX"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>
  -->

  <!-- Result Area -->
  <div id="result-area"></div>

  <!-- History -->
  <div id="history-area"></div>

  <!-- Collections -->
  <div id="collections-area"></div>

</div>

<script>
  /* ── State ── */
  const ingredients = [];
  let currentRecipe = null;

  /* ── Form Accordion ── */
  function collapseForm() {
    document.getElementById('form-section').classList.add('collapsed');
    const acc = document.getElementById('form-accordion');
    acc.classList.add('visible');
    const region = document.getElementById('region-select').value;
    const dietary = getSelectedDietary();
    const parts = [
      ingredients.map(i => i.name).join(', ') || 'No ingredients',
      region === 'Surprise Me' ? 'Any cuisine' : region.split('/')[0].trim(),
      ...dietary,
    ];
    document.getElementById('form-accordion-detail').textContent = parts.join(' · ');
  }

  function toggleFormSection() {
    const sec = document.getElementById('form-section');
    const acc = document.getElementById('form-accordion');
    const isCollapsed = sec.classList.contains('collapsed');
    sec.classList.toggle('collapsed', !isCollapsed);
    acc.classList.toggle('visible', !isCollapsed);
  }

  /* ── Dietary Filters ── */
  function handleDietaryChange() {
    const veganEl = document.getElementById('diet-vegan');
    const vegEl   = document.getElementById('diet-vegetarian');
    if (veganEl.checked) { vegEl.checked = true; vegEl.disabled = true; }
    else { vegEl.disabled = false; }
  }

  function getSelectedDietary() {
    return ['diet-vegetarian','diet-vegan','diet-gluten-free','diet-dairy-free','diet-nut-free']
      .filter(id => document.getElementById(id)?.checked)
      .map(id => document.getElementById(id).value);
  }

  /* ── Add Ingredient ── */
  function addIngredient() {
    const nameEl = document.getElementById('ingr-name');
    const qtyEl  = document.getElementById('ingr-qty');
    const unitEl = document.getElementById('ingr-unit');

    const name = nameEl.value.trim();
    const qty  = qtyEl.value.trim();
    const unit = unitEl.value;

    if (!name) { nameEl.focus(); return; }

    ingredients.push({ name, qty, unit });
    renderChips();

    nameEl.value = '';
    qtyEl.value  = '';
    nameEl.focus();
  }

  /* ── Autocomplete ── */
  const AC_SUGGESTIONS = [
    'Egg','Tomato','Onion','Potato','Garlic','Ginger','Milk','Butter','Cheese','Bread',
    'Rice','Pasta','Flour','Sugar','Salt','Oil','Lemon','Lime','Carrot','Capsicum (Bell Pepper)',
    'Spinach','Cauliflower','Cabbage','Peas','Corn','Mushroom','Broccoli','Zucchini','Celery',
    'Green Chili','Coriander Leaves','Curry Leaves','Paneer','Chicken','Mutton','Fish','Prawns',
    'Tofu','Curd (Yogurt)','Cream','Coconut Milk','Ghee','Olive Oil','Soy Sauce','Vinegar',
    'Tamarind','Jaggery','Turmeric','Cumin','Coriander Powder','Red Chili Powder','Garam Masala',
    'Mustard Seeds','Black Pepper','Cardamom','Cinnamon','Cloves','Bay Leaf','Atta (Wheat Flour)',
    'Besan (Gram Flour)','Basmati Rice','Chana Dal','Moong Dal','Urad Dal','Rajma (Kidney Beans)',
    'Chickpeas','Okra (Bhindi)','Brinjal (Eggplant)','Pumpkin','Sweet Potato','Beetroot',
    'Noodles','Oats','Banana','Apple','Mango','Coconut',
  ];

  let acActiveIdx = -1;
  const acInput = document.getElementById('ingr-name');
  const acList  = document.getElementById('autocomplete-list');

  acInput.addEventListener('input', () => {
    const val = acInput.value.trim().toLowerCase();
    if (!val) { acClose(); return; }
    const matches = AC_SUGGESTIONS
      .filter(s => s.toLowerCase().includes(val))
      .sort((a, b) => {
        const ai = a.toLowerCase().indexOf(val), bi = b.toLowerCase().indexOf(val);
        return ai !== bi ? ai - bi : a.localeCompare(b);
      })
      .slice(0, 8);
    if (!matches.length) { acClose(); return; }
    acActiveIdx = -1;
    acList.innerHTML = matches.map(m => {
      const lo = m.toLowerCase(), idx = lo.indexOf(val);
      const hi = m.slice(0, idx) + '<mark>' + m.slice(idx, idx + val.length) + '</mark>' + m.slice(idx + val.length);
      return `<div class="autocomplete-item" data-val="${m}" onmousedown="acSelect('${m.replace(/'/g,"\\'")}')"> ${hi}</div>`;
    }).join('');
    acList.style.display = 'block';
  });

  acInput.addEventListener('keydown', e => {
    const items = acList.querySelectorAll('.autocomplete-item');
    if (acList.style.display === 'block' && items.length) {
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        acActiveIdx = Math.min(acActiveIdx + 1, items.length - 1);
        items.forEach((el, i) => el.classList.toggle('ac-active', i === acActiveIdx));
        return;
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        acActiveIdx = Math.max(acActiveIdx - 1, -1);
        items.forEach((el, i) => el.classList.toggle('ac-active', i === acActiveIdx));
        return;
      }
      if (e.key === 'Enter' && acActiveIdx >= 0) {
        e.preventDefault();
        acSelect(items[acActiveIdx].dataset.val);
        return;
      }
      if (e.key === 'Escape') { acClose(); return; }
    }
    if (e.key === 'Enter') addIngredient();
  });

  acInput.addEventListener('blur', () => setTimeout(acClose, 150));

  function acSelect(val) {
    acInput.value = val;
    acClose();
    document.getElementById('ingr-qty').focus();
  }

  function acClose() {
    acList.style.display = 'none';
    acActiveIdx = -1;
  }

  /* ── Remove Ingredient ── */
  function removeIngredient(i) {
    ingredients.splice(i, 1);
    renderChips();
  }

  /* ── Clear All ── */
  function clearAll() {
    ingredients.length = 0;
    renderChips();
  }

  /* ── Render Chips ── */
  function renderChips() {
    const container  = document.getElementById('chips-container');
    const header     = document.getElementById('chips-header');
    const countLabel = document.getElementById('chips-count');

    if (!ingredients.length) {
      header.style.display = 'none';
      container.innerHTML  = '<span class="empty-hint">No ingredients added yet. Qty is optional.</span>';
      return;
    }

    header.style.display = 'flex';
    countLabel.textContent = `${ingredients.length} ingredient${ingredients.length > 1 ? 's' : ''} added`;

    container.innerHTML = ingredients.map((ing, i) => {
      const qtyLabel = ing.qty ? ` · ${ing.qty} ${ing.unit}` : '';
      return `
        <span class="chip">
          ${ing.name}
          ${ing.qty ? `<span class="chip-qty">${qtyLabel}</span>` : ''}
          <button class="chip-remove" onclick="removeIngredient(${i})" title="Remove">×</button>
        </span>`;
    }).join('');
  }

  /* ── Generate Recipe ── */
  async function generateRecipe() {
    if (!ingredients.length) {
      alert('Add at least one ingredient first!');
      return;
    }

    const region     = document.getElementById('region-select').value;
    const btn        = document.getElementById('gen-btn');
    const resultArea = document.getElementById('result-area');

    btn.disabled    = true;
    btn.textContent = 'Finding your recipe…';

    const loadingMsg = region === 'Surprise Me'
      ? 'Picking the best recipe for your ingredients…'
      : `Finding a perfect ${region} recipe for your ingredients…`;

    resultArea.innerHTML = `
      <div class="loading-wrap">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <div class="loading-text">${loadingMsg}</div>
      </div>`;

    try {
      const response = await fetch("/api/recipe", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ingredients, region, dietary: getSelectedDietary() })
      });

      const data = await response.json();
      if (!response.ok) throw new Error(data.error || 'Server error');
      const cleanText = (data.text || '').replace(/```json|```/g, '').trim();

      let recipe;
      try {
        recipe = JSON.parse(cleanText);
      } catch (_) {
        throw new Error('The recipe response was incomplete. Please try again.');
      }

      renderResult(recipe);
      saveToHistory(recipe);
    } catch (err) {
      resultArea.innerHTML = `
        <div class="error-msg">
          Something went wrong. Please try again.<br>
          <small style="opacity:0.55; margin-top:4px; display:block;">${err.message}</small>
        </div>`;
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Find My Recipe';
    }
  }

  /* ── Render Result ── */
  function renderResult(r) {
    collapseForm();
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    isSpeaking = false; isPaused = false;
    currentRecipe = r;
    const n = r.nutrition_per_serving || {};

    const metaParts = [r.cuisine, `${r.servings} servings`, `Prep ${r.prep_time}`, `Cook ${r.cook_time}`];

    const stepsHTML = (r.steps || [])
      .map(s => `<li><span>${s}</span></li>`)
      .join('');

    const ingrHTML = (r.ingredients_used || [])
      .map(i => `<tr><td>${i.name}</td><td>${i.amount}</td></tr>`)
      .join('');

    const nutritionItems = [
      { label: 'Calories',  value: n.calories,    unit: 'kcal' },
      { label: 'Protein',   value: n.protein_g,   unit: 'g' },
      { label: 'Carbs',     value: n.carbs_g,     unit: 'g' },
      { label: 'Fat',       value: n.fat_g,        unit: 'g' },
      { label: 'Fiber',     value: n.fiber_g,      unit: 'g' },
      { label: 'Sodium',    value: n.sodium_mg,    unit: 'mg' },
    ].map(item => `
      <div class="nutrition-item">
        <div class="nutrition-label">${item.label}</div>
        <div class="nutrition-value">${item.value ?? '—'}<span class="nutrition-unit"> ${item.unit}</span></div>
      </div>`).join('');

    document.getElementById('result-area').innerHTML = `
      <div class="result-card">

        <div class="recipe-name">${r.recipe_name}</div>
        <div class="recipe-meta">${metaParts.map(p => `<span class="recipe-meta-badge">${escapeHtml(String(p))}</span>`).join('')}</div>

        <div class="result-section-title">Ingredients</div>
        <table class="ingr-table">${ingrHTML}</table>

        <div class="result-section-title">How to make it</div>
        <ol class="steps-list">${stepsHTML}</ol>

        ${r.chef_tip ? `
          <div class="result-section-title">Chef's tip</div>
          <div class="tip-box">${r.chef_tip}</div>` : ''}

        <div class="result-section-title">Nutrition &mdash; per serving</div>
        <div class="nutrition-grid">${nutritionItems}</div>

        <div class="speak-bar">
          <button class="speak-btn" id="speak-btn" onclick="toggleSpeak()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            Listen to Recipe
          </button>
          <button class="speak-ctrl" id="speak-stop" onclick="stopSpeak()" title="Stop" style="display:none;">⏹</button>
        </div>

        <a class="yt-link" href="https://www.youtube.com/results?search_query=${encodeURIComponent(r.recipe_name + ' recipe')}" target="_blank" rel="noopener noreferrer">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#c0392b"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="white"/></svg>
          Watch how to make ${escapeHtml(r.recipe_name)}
        </a>

        <button class="save-btn" onclick="toggleSavePanel()">Save to Collection</button>
        <div id="save-panel" style="display:none;"></div>

        <button class="share-btn" id="share-btn" onclick="shareRecipe()">Share / Copy Recipe</button>
        <button class="try-again-btn" onclick="generateRecipe()">Generate another recipe with the same ingredients</button>

      </div>`;

    /* Scroll result into view on mobile */
    document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  /* ── Recipe History ── */
  const HISTORY_KEY = 'ftf_history';
  const MAX_HISTORY = 10;

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function saveToHistory(recipe) {
    const history = getHistory();
    history.unshift({ id: Date.now(), recipe_name: recipe.recipe_name, cuisine: recipe.cuisine, timestamp: Date.now(), recipe });
    if (history.length > MAX_HISTORY) history.length = MAX_HISTORY;
    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); } catch (_) {}
    renderHistory();
  }

  function getHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch (_) { return []; }
  }

  function clearHistory() { localStorage.removeItem(HISTORY_KEY); renderHistory(); }

  function relativeTime(ts) {
    const diff = Date.now() - ts;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins} min${mins > 1 ? 's' : ''} ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs} hr${hrs > 1 ? 's' : ''} ago`;
    const days = Math.floor(hrs / 24);
    return `${days} day${days > 1 ? 's' : ''} ago`;
  }

  function renderHistory() {
    const history = getHistory();
    const area = document.getElementById('history-area');
    if (!history.length) { area.innerHTML = ''; return; }
    area.innerHTML = `
      <div class="history-section">
        <div class="history-header">
          <div class="history-title">Recent Recipes</div>
          <button class="clear-btn" onclick="clearHistory()">Clear history</button>
        </div>
        <div class="history-list">
          ${history.map(item => `
            <div class="history-item" onclick="loadHistoryItem(${item.id})">
              <div>
                <div class="history-item-name">${escapeHtml(item.recipe_name)}</div>
                <div class="history-item-meta">${escapeHtml(item.cuisine)}</div>
              </div>
              <div class="history-item-time">${relativeTime(item.timestamp)}</div>
            </div>`).join('')}
        </div>
      </div>`;
  }

  function loadHistoryItem(id) {
    const item = getHistory().find(h => h.id === id);
    if (item) { renderResult(item.recipe); document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' }); }
  }

  /* ── Share / Copy ── */
  function buildShareText(r) {
    const ingr  = (r.ingredients_used || []).map(i => `  - ${i.name}: ${i.amount}`).join('\n');
    const steps = (r.steps || []).map((s, i) => `  ${i + 1}. ${s}`).join('\n');
    return `${r.recipe_name} (${r.cuisine})\n\nIngredients:\n${ingr}\n\nSteps:\n${steps}${r.chef_tip ? `\n\nTip: ${r.chef_tip}` : ''}\n\nMade with Fridge to Feast`;
  }

  async function shareRecipe() {
    if (!currentRecipe) return;
    const text = buildShareText(currentRecipe);
    const btn  = document.getElementById('share-btn');
    if (navigator.share) {
      try { await navigator.share({ title: currentRecipe.recipe_name, text }); return; } catch (_) {}
    }
    try {
      await navigator.clipboard.writeText(text);
      if (btn) { btn.textContent = 'Copied!'; setTimeout(() => { btn.textContent = 'Share / Copy Recipe'; }, 2000); }
    } catch (_) { alert('Could not copy. Please copy the recipe manually.'); }
  }

  /* ── Text-to-Speech ── */
  let isSpeaking = false;
  let isPaused   = false;

  function buildSpeechText(r) {
    const ingr  = (r.ingredients_used || []).map(i => `${i.name}, ${i.amount}`).join('. ');
    const steps = (r.steps || []).map((s, i) => `Step ${i + 1}. ${s}`).join('. ');
    return [
      `${r.recipe_name}.`,
      `${r.cuisine} cuisine.`,
      `Serves ${r.servings}. Prep time ${r.prep_time}. Cook time ${r.cook_time}.`,
      `Ingredients. ${ingr}.`,
      `How to make it. ${steps}.`,
      r.chef_tip ? `Chef tip. ${r.chef_tip}.` : '',
    ].filter(Boolean).join(' ');
  }

  function toggleSpeak() {
    if (!window.speechSynthesis) {
      alert('Text-to-speech is not supported in your browser.');
      return;
    }
    if (isSpeaking && !isPaused) {
      window.speechSynthesis.pause();
      isPaused = true;
      updateSpeakUI();
      return;
    }
    if (isSpeaking && isPaused) {
      window.speechSynthesis.resume();
      isPaused = false;
      updateSpeakUI();
      return;
    }
    if (!currentRecipe) return;
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(buildSpeechText(currentRecipe));
    utt.rate  = 0.92;
    utt.pitch = 1;
    utt.lang  = 'en-US';
    utt.onstart = () => { isSpeaking = true; isPaused = false; updateSpeakUI(); };
    utt.onend   = () => { isSpeaking = false; isPaused = false; updateSpeakUI(); };
    utt.onerror = () => { isSpeaking = false; isPaused = false; updateSpeakUI(); };
    window.speechSynthesis.speak(utt);
  }

  function stopSpeak() {
    window.speechSynthesis.cancel();
    isSpeaking = false;
    isPaused   = false;
    updateSpeakUI();
  }

  function updateSpeakUI() {
    const btn  = document.getElementById('speak-btn');
    const stop = document.getElementById('speak-stop');
    if (!btn) return;
    if (!isSpeaking) {
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg> Listen to Recipe`;
      if (stop) stop.style.display = 'none';
    } else if (isPaused) {
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Resume`;
      if (stop) stop.style.display = '';
    } else {
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Pause`;
      if (stop) stop.style.display = '';
    }
  }

  /* ── Collections ── */
  const COLLECTIONS_KEY = 'ftf_collections';
  const expandedCollections = new Set();

  function getCollections() {
    try { return JSON.parse(localStorage.getItem(COLLECTIONS_KEY) || '[]'); } catch (_) { return []; }
  }

  function saveCollections(cols) {
    try { localStorage.setItem(COLLECTIONS_KEY, JSON.stringify(cols)); } catch (_) {}
  }

  function toggleSavePanel() {
    const panel = document.getElementById('save-panel');
    if (!panel) return;
    if (panel.style.display === 'none') {
      panel.style.display = 'block';
      panel.innerHTML = buildSavePanel();
    } else {
      panel.style.display = 'none';
    }
  }

  function buildSavePanel() {
    const cols = getCollections();
    const existingHTML = cols.length
      ? cols.map(c => `
          <div class="save-panel-item" onclick="saveToCollection(${c.id})">
            <span>${escapeHtml(c.name)}</span>
            <span class="save-panel-count">${c.recipes.length} recipe${c.recipes.length !== 1 ? 's' : ''}</span>
          </div>`).join('')
      : '<div class="save-panel-empty">No collections yet — create one below.</div>';
    return `
      <div class="save-panel">
        ${existingHTML}
        <div class="save-panel-new">
          <input type="text" id="new-col-name" placeholder="New collection name…" onkeydown="if(event.key==='Enter')createCollectionAndSave()" />
          <button onclick="createCollectionAndSave()">Create & Save</button>
        </div>
      </div>`;
  }

  function saveToCollection(colId) {
    if (!currentRecipe) return;
    const cols = getCollections();
    const col = cols.find(c => c.id === colId);
    if (!col) return;
    const alreadySaved = col.recipes.some(r => r.recipe_name === currentRecipe.recipe_name && r.cuisine === currentRecipe.cuisine);
    if (!alreadySaved) {
      col.recipes.unshift({ savedId: Date.now(), savedAt: Date.now(), ...currentRecipe });
    }
    saveCollections(cols);
    renderCollections();
    const btn = document.querySelector('.save-btn');
    if (btn) { btn.textContent = '✓ Saved'; setTimeout(() => { btn.textContent = 'Save to Collection'; }, 1500); }
    const panel = document.getElementById('save-panel');
    if (panel) panel.style.display = 'none';
  }

  function createCollectionAndSave() {
    if (!currentRecipe) return;
    const input = document.getElementById('new-col-name');
    const name = input ? input.value.trim() : '';
    if (!name) { if (input) input.focus(); return; }
    const cols = getCollections();
    const newCol = { id: Date.now(), name, createdAt: Date.now(), recipes: [{ savedId: Date.now(), savedAt: Date.now(), ...currentRecipe }] };
    cols.unshift(newCol);
    saveCollections(cols);
    expandedCollections.add(newCol.id);
    renderCollections();
    const btn = document.querySelector('.save-btn');
    if (btn) { btn.textContent = '✓ Saved'; setTimeout(() => { btn.textContent = 'Save to Collection'; }, 1500); }
    const panel = document.getElementById('save-panel');
    if (panel) panel.style.display = 'none';
  }

  function removeFromCollection(colId, savedId) {
    const cols = getCollections();
    const col = cols.find(c => c.id === colId);
    if (col) col.recipes = col.recipes.filter(r => r.savedId !== savedId);
    saveCollections(cols);
    renderCollections();
  }

  function deleteCollection(colId) {
    const cols = getCollections().filter(c => c.id !== colId);
    expandedCollections.delete(colId);
    saveCollections(cols);
    renderCollections();
  }

  function toggleCollectionExpand(colId) {
    if (expandedCollections.has(colId)) expandedCollections.delete(colId);
    else expandedCollections.add(colId);
    renderCollections();
  }

  function renderCollections() {
    const cols = getCollections();
    const area = document.getElementById('collections-area');
    if (!area) return;
    if (!cols.length) { area.innerHTML = ''; return; }

    const colsHTML = cols.map(col => {
      const isOpen = expandedCollections.has(col.id);
      const recipesHTML = isOpen && col.recipes.length
        ? `<div class="collection-recipes">
            ${col.recipes.map(r => `
              <div class="collection-recipe-item">
                <div class="collection-recipe-info" onclick="loadCollectionRecipe(${col.id}, ${r.savedId})">
                  <div class="collection-recipe-name">${escapeHtml(r.recipe_name)}</div>
                  <div class="collection-recipe-meta">${escapeHtml(r.cuisine)}</div>
                </div>
                <button class="collection-recipe-remove" onclick="removeFromCollection(${col.id}, ${r.savedId})" title="Remove">×</button>
              </div>`).join('')}
          </div>` : '';

      return `
        <div class="collection-card">
          <div class="collection-card-header" onclick="toggleCollectionExpand(${col.id})">
            <span class="collection-chevron ${isOpen ? 'open' : ''}">▶</span>
            <span class="collection-name">${escapeHtml(col.name)}</span>
            <span class="collection-count">${col.recipes.length} recipe${col.recipes.length !== 1 ? 's' : ''}</span>
            <button class="collection-del-btn" onclick="event.stopPropagation(); deleteCollection(${col.id})" title="Delete collection">×</button>
          </div>
          ${recipesHTML}
        </div>`;
    }).join('');

    area.innerHTML = `
      <div class="collections-section">
        <div class="collections-header">
          <div class="collections-title">My Collections</div>
        </div>
        ${colsHTML}
      </div>`;
  }

  function loadCollectionRecipe(colId, savedId) {
    const col = getCollections().find(c => c.id === colId);
    if (!col) return;
    const item = col.recipes.find(r => r.savedId === savedId);
    if (item) { renderResult(item); document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' }); }
  }

  /* ── Init ── */
  renderHistory();
  renderCollections();
</script>

</body>
</html>
